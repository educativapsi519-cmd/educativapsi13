<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contenido de Tablas Supabase</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js';

  // Configuración de Supabase
  const supabaseUrl = 'https://jffprbxkoufhnhohnbeb.supabase.co';
  const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmZnByYnhrb3VmaG5ob2huYmViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NDYwNTksImV4cCI6MjA4OTAyMjA1OX0.Jnyrd-F6puWhgbQBBQaAjWK1F04owUnBT7D0TVDyxoA';
  const supabase = createClient(supabaseUrl, supabaseKey);

  // Lista de tablas (en minúsculas para asegurar compatibilidad con PostgreSQL)
  const tablas = ['usuarios', 'grupos', 'alumnos', 'columnas', 'alumno_valores', 'historial'];

  // Función para mostrar los datos de cada tabla
  async function mostrarTabla(tabla) {
    const container = document.getElementById('tablas-container');

    const section = document.createElement('section');
    section.classList.add('my-4');

    const title = document.createElement('h3');
    title.textContent = tabla;
    section.appendChild(title);

    try {
      console.log(`Consultando tabla ${tabla}...`);
      const { data, error } = await supabase.from(tabla).select('*');

      if (error) {
        console.error(`Error en ${tabla}:`, error);
        const p = document.createElement('p');
        p.textContent = `Error al cargar ${tabla}: ${error.message}`;
        p.classList.add('text-danger');
        section.appendChild(p);
      } else if (!data || data.length === 0) {
        const p = document.createElement('p');
        p.textContent = 'No hay datos';
        section.appendChild(p);
      } else {
        const table = document.createElement('table');
        table.classList.add('table', 'table-striped', 'table-bordered');

        // Cabecera
        const thead = document.createElement('thead');
        const headerRow = document.createElement('tr');
        Object.keys(data[0]).forEach(col => {
          const th = document.createElement('th');
          th.textContent = col;
          headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);
        table.appendChild(thead);

        // Cuerpo
        const tbody = document.createElement('tbody');
        data.forEach(row => {
          const tr = document.createElement('tr');
          Object.values(row).forEach(val => {
            const td = document.createElement('td');
            // Maneja arrays y objetos JSON
            if (Array.isArray(val)) {
              td.textContent = val.join(', ');
            } else if (typeof val === 'object' && val !== null) {
              td.textContent = JSON.stringify(val);
            } else {
              td.textContent = val;
            }
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        section.appendChild(table);
        console.log(`Tabla ${tabla} cargada con ${data.length} registros`);
      }
    } catch (err) {
      console.error(`Error inesperado en ${tabla}:`, err);
      const p = document.createElement('p');
      p.textContent = `Error inesperado al cargar ${tabla}: ${err.message}`;
      p.classList.add('text-danger');
      section.appendChild(p);
    }

    container.appendChild(section);
  }

  // Mostrar todas las tablas
  tablas.forEach(tabla => mostrarTabla(tabla));

</script>
</head>
<body class="p-4">
  <div class="container">
    <h1>Contenido de las Tablas</h1>
    <div id="tablas-container"></div>
  </div>
</body>
</html>
